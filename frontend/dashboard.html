<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="dicoding:email" content="ardiansyah6246@gmail.com">
    <title>Dashboard Monitoring UMKM</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        h1 { color: #333; margin-bottom: 30px; }
        .container { display: flex; gap: 20px; }
        .card { background: white; border: 1px solid #ddd; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 200px; text-align: center; }
        h2 { font-size: 14px; text-transform: uppercase; color: #888; margin-top: 0; }
        p { font-size: 36px; font-weight: bold; color: #2c3e50; margin: 10px 0 0 0; }
        .refresh-msg { margin-top: 20px; color: #7f8c8d; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Dashboard Monitoring</h1>
    <div class="container">
        <div class="card">
            <h2>Total User</h2>
            <p id="totalUsers">...</p>
        </div>
        <div class="card">
            <h2>Total Pesan</h2>
            <p id="totalMessages">...</p>
        </div>
    </div>

    <h2 style="margin-top: 40px; color: #333;">User Paling Aktif</h2>
    <table id="userTable" style="border-collapse: collapse; width: 400px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <thead>
            <tr style="background: #2c3e50; color: white;">
                <th style="padding: 12px; text-align: left;">Nama User</th>
                <th style="padding: 12px; text-align: center;">Jumlah Pesan</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
            <!-- Data akan masuk di sini -->
        </tbody>
    </table>

    <div class="refresh-msg">Auto-refresh setiap 5 detik</div>

    <script>
        // Cek login
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = 'login.html';

        async function updateStats() {
            try {
                // Gunakan token yang tersimpan di localStorage
                const token = localStorage.getItem('adminToken');
                const response = await fetch('http://localhost:3002/api/admin/stats', {
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-admin-token': token 
                    }
                });
                
                if (response.status === 403) {
                    window.location.href = 'login.html';
                    return;
                }

                const result = await response.json();
                if(result.success) {
                    document.getElementById('totalUsers').innerText = result.data.totalUsers;
                    document.getElementById('totalMessages').innerText = result.data.totalMessages;

                    const tbody = document.getElementById('userTableBody');
                    tbody.innerHTML = '';
                    result.data.topUsers.forEach(user => {
                        tbody.innerHTML += `
                            <tr style="border-bottom: 1px solid #eee;">
                                <td style="padding: 12px;">${user.name}</td>
                                <td style="padding: 12px; text-align: center;">${user.count}</td>
                            </tr>
                        `;
                    });
                }
            } catch (err) { 
                console.error('Gagal mengambil data:', err); 
            }
        }
        updateStats();
        setInterval(updateStats, 5000);
    </script>
</body>
</html>
